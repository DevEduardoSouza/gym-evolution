services:
  app:
    build: .
    container_name: gym_app
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - AUTH_USER=admin
      - AUTH_PASS=change-me
      - SESSION_SECRET=change-me-to-a-random-secret
    volumes:
      - gym_data:/app/data

volumes:
  gym_data:
