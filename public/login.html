<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Evolução Corporal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-title">Gym Evolution</h1>
      <p class="login-subtitle">Acompanhamento de Evolução Corporal</p>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required>
        </div>
        <p id="login-error" class="login-error" style="display:none;"></p>
        <button type="submit" class="btn-primary login-btn">Entrar</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('login-error');
      errorEl.style.display = 'none';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json();
          errorEl.textContent = data.error || 'Erro ao fazer login';
          errorEl.style.display = 'block';
        }
      } catch {
        errorEl.textContent = 'Erro de conexão';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
